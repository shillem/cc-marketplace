artifacts:
  proposal:
    description: Initial proposal document outlining the change
    output: proposal.md
    plan:
      instruction: |
        Create the proposal document that establishes WHY this change is needed.

        Sections:
        - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve?
        - **What Changes**: Bullet list of changes. Be specific about new domains, modifications, or removals. Mark breaking changes with **BREAKING**.
        - **Domains**: Identify which domain specs will be created or modified:
          - **New Domains**: Domains not yet defined that this change introduces. Use kebab-case names.
          - **Modified Domains**: Existing domains whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details).
          - Remove either subsection if not applicable.
        - **Impact**: Affected code, APIs, dependencies, or systems.

        Existing domains:
        {{DOMAINS}}

        Keep it concise (1-2 pages). Focus on the "why" not the "how" — implementation details belong in design.md.

        **Important**:
        - The Domains section is critical. It creates the contract between proposal and specs phases. Each domain defined in this document will need a corresponding spec file.
        - When domain's description appears insufficient, use the **Agent** tool to evaluate which ones will be affected.

  specs:
    description: Detailed specifications for the change
    output: specs/{domain}/spec.md
    plan:
      instruction: |
        Create specification files that define WHAT the system should do.

        Create one spec file per domain listed in the proposal's Domains section.
        - New Domains: use the exact kebab-case name from the proposal.
        - Modified Domains: use the existing domain name when creating the delta spec.

        Read the existing domain specs for each of the mentioned domains in the proposal's Domains section.

        Existing domains:
        {{DOMAINS}}

        Delta operations (use ## headers):
        - **ADDED Requirements**: New requirements for this domain
        - **MODIFIED Requirements**: Changed behavior — MUST include full updated content
        - **REMOVED Requirements**: Deprecated features — MUST include **Reason** and **Migration**
        - **RENAMED Requirements**: Name changes only — use FROM:/TO: format

        Format requirements:
        - Each requirement: `### Requirement: <name>` followed by description
        - Use SHALL/MUST for normative requirements (avoid should/may)
        - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
        - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
        - Every requirement MUST have at least one scenario.

        MODIFIED requirements workflow:
        1. Locate the existing requirement in the domain spec file
        2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
        3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
        4. Ensure header text matches exactly (whitespace-insensitive)

        Common pitfall: Using MODIFIED with partial content loses detail at archive time.
        If adding new concerns without changing existing behavior, use ADDED instead.

        Specs should be testable — each scenario is a potential test case.
    archive:
      instruction: |
        Merge delta specs into the accumulated domain spec files.

        Delta specs:
        {{DELTAS}}

        Domain specs:
        {{DOMAINS}}

        For each delta spec file, read the corresponding domain spec file (if it exists) and apply changes:

        - **ADDED Requirements**: Append under an `## Requirements` section in the domain spec.
        - **MODIFIED Requirements**: Find the matching requirement in the domain spec by header text (whitespace-insensitive) and replace it entirely. If not found, treat as ADDED.
        - **RENAMED Requirements**: Find by the FROM: name and update the header to the TO: name.
        - **REMOVED Requirements**: Find and remove the matching requirement from the domain spec. If not found, skip silently.

        If the domain spec file doesn't exist yet, create the domain directory and spec file with the ADDED requirements.

        Every delta spec file MUST include a YAML frontmatter `description` field:

        - For new domains, write the initial description of the domain's responsibility.
        - For modified domains, update the description if the domain's scope has changed.

  design:
    description: Technical design document with implementation details
    output: design.md
    plan:
      instruction: |
        Create the design document that explains HOW to implement the change.
        If the change is straightforward, keep design content minimal.

        Sections:
        - **Context**: Background, current state, constraints, stakeholders
        - **Goals / Non-Goals**: What this design achieves and explicitly excludes
        - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
        - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
        - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
        - **Open Questions**: Outstanding decisions or unknowns to resolve

        Reference requirements from specs when making technical decisions.
        The design should explain how to satisfy the requirements defined in specs.
        Focus on architecture and approach, not line-by-line implementation.

        Good design docs explain the "why" behind technical decisions.

  tasks:
    description: Implementation checklist with trackable tasks
    output: tasks.md
    plan:
      instruction: |
        Create the task list that breaks down the implementation work.

        IMPORTANT: Follow the template exactly. The apply phase parses checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

        Guidelines:
        - Group related tasks under ## numbered headings
        - Each task MUST be a checkbox: `- [ ] X.Y Task description`
        - Tasks should be small enough to complete in one session
        - Order tasks by dependency (what must be done first?)

        Reference specs for what needs to be built, design for how to build it.
        Each task should be verifiable — you know when it's done.

        When listing tasks, consider whether the project's tests should be run as a verification step and include it if appropriate.
    apply:
      instruction: |
        Assigned Task Group:
        {{TASK_GROUP}}

        Work through the task group subtasks sequentially, marking each checkbox as complete (`- [x]`) as you finish it.
        Keep changes minimal and focused on each task.
        If you hit a blocker or unclear requirement, stop immediately and report the issue — do not guess or skip ahead.
        After completing all tasks in the group, summarize what was done.

workflows:
  spec-anchored:
    description: Full pipeline with proposal, specs, design, and tasks. Specs accumulate over time as changes are archived into domain specs. Best for projects where you want to build up living documentation.
    plan: [proposal, specs, design, tasks]
    apply: [tasks]
    archive: [specs]
  spec-first:
    description: Lightweight pipeline with specs and tasks only. Specs organize the change but aren't archived. Best for projects where you want structured planning without long-term spec maintenance.
    plan: [specs, tasks]
    apply: [tasks]

workflow: spec-anchored
