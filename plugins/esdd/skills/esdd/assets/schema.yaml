artifacts:
  brief:
    description: Combined proposal and design brief for smaller changes
    output: brief.md
    plan:
      template: brief.md
      instruction: |
        Create a brief document that captures WHY this change is needed and HOW you plan to approach it.

        Sections:
        - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve?
        - **What Changes**: Bullet list of concrete changes. Mark breaking changes with **BREAKING**
        - **Domains**: Identify which domain specs will be created or modified:
          - **New Domains**: Domains not yet defined. Use kebab-case names.
          - **Modified Domains**: Existing domains whose REQUIREMENTS are changing
          - Remove either subsection if not applicable
        - **Approach**: Key technical decisions with rationale (why X over Y?)
        - **Risks**: Known risks or trade-offs (omit section if none)

        Existing domains (for context):
        {{DOMAINS}}

        Keep it to half a page.
  proposal:
    description: Initial proposal document outlining the change
    output: proposal.md
    plan:
      template: proposal.md
      discussion: true
      instruction: |
        Create the proposal document that establishes WHY this change is needed.

        Existing domains (for context):
        {{DOMAINS}}

        Sections:
        - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve?
        - **What Changes**: Bullet list of changes. Be specific about new domains, modifications, or removals. Mark breaking changes with **BREAKING**
        - **Domains**: Identify which domain specs will be created or modified:
          - **New Domains**: Domains not yet defined that this change introduces. Use kebab-case names.
          - **Modified Domains**: Existing domains whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details).
          - Remove either subsection if not applicable
        - **Impact**: Affected code, APIs, dependencies, or systems

        Keep it concise (1-2 pages). Focus on the "why" not the "how".

        **Important**:
        - The Domains section is critical. It creates the contract between proposal and specs phases. Each domain defined in this document will need a corresponding spec file.
        - When a domain's description appears insufficient, use the **Agent** tool to evaluate which ones will be affected.
  specs:
    description: Detailed specifications for the change
    output: specs/{domain}.md
    plan:
      template: spec.md
      instruction: |
        Create specification files that define WHAT the system should do.  
        One spec file per domain listed in the proposal's Domains section.

        Existing domains (for context):
        {{DOMAINS}}

        For each domain in the proposal's Domains section:
        - **New Domains**: use the exact kebab-case name from the proposal. In the frontmatter description field, write the initial description of the domain's responsibility.
        - **Modified Domains**: use the existing domain name when creating the delta domain spec. In the frontmatter description field, write the current domain's description, or update it if the domain's scope has changed. Include ONLY requirements that are actually changing — do not restate the full domain.

        Delta operations (use ## headers):
        - **ADDED Requirements**: New requirements for this domain
        - **MODIFIED Requirements**: Changed behavior — MUST include full updated content
        - **RENAMED Requirements**: Name changes only — list pairs as `- FROM: \`old-name\` TO: \`new-name\`` (one pair per bullet)
        - **REMOVED Requirements**: Deprecated features — MUST include **Reason** and **Migration**

        Format requirements:
        - Each requirement: `### Requirement: <name>` followed by description
          - Use SHALL/MUST for normative requirements (avoid should/may)
        - Each scenario: `#### Scenario: <name>` with GIVEN/WHEN/THEN format
          - **GIVEN** preconditions and initial state (omit if none)
          - **WHEN** the triggering action or event
          - **THEN** the expected outcome
          - Use **AND** to chain multiple conditions within any step
          - Each scenario is a potential test case — make conditions concrete and verifiable
        - Every requirement MUST have at least one scenario. Split into multiple scenarios for distinct paths (happy path, error cases, edge conditions).

        MODIFIED requirements workflow:
        1. Locate the existing requirement in the domain spec file
        2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
        3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
        4. Ensure header text matches exactly (whitespace-insensitive)

        Testability:
        - Consider whether the domain has performance targets, security constraints, or compliance requirements. Express these as regular requirements with measurable GIVEN/WHEN/THEN scenarios (e.g., "GIVEN a system under normal load, WHEN 1000 concurrent requests arrive, THEN p95 latency < 200ms").
    archive:
      instruction: |
        Merge delta domain specs into the accumulated domain spec files.

        Existing domains (for context):
        {{DOMAINS}}

        Delta domain specs:
        {{DELTAS}}

        For each delta domain spec file, read the corresponding domain spec file (if it exists) and apply changes:

        - **ADDED Requirements**: Append under a `## Requirements` section in the domain spec.
        - **MODIFIED Requirements**: Find the matching requirement in the domain spec by header text (whitespace-insensitive) and replace it entirely. If not found, treat as ADDED.
        - **RENAMED Requirements**: Find by the FROM: name and update the header to the TO: name.
        - **REMOVED Requirements**: Find and remove the matching requirement from the domain spec. If not found, skip silently.

        If the domain spec file doesn't exist yet, create it with the ADDED requirements.
    document:
      template: domain.md
      instruction: |
        Analyze the code within the scope and produce an accumulated domain spec.
        If the scope is empty, infer relevant paths from the domain name, its description, and project map if defined.

        Format requirements:
        - Each requirement: `### Requirement: <name>` followed by description
          - Use SHALL/MUST for normative requirements (avoid should/may)
        - Each scenario: `#### Scenario: <name>` with GIVEN/WHEN/THEN format
          - **GIVEN** preconditions and initial state (omit if none)
          - **WHEN** the triggering action or event
          - **THEN** the expected outcome
          - Use **AND** to chain multiple conditions within any step
          - Each scenario is a potential test case — make conditions concrete and verifiable
        - Every requirement MUST have at least one scenario. Split into multiple scenarios for distinct paths (happy path, error cases, edge conditions).

        If a spec file already exists at the output path, treat its requirements as the authoritative baseline. For each existing requirement:
          - If code within the scope supports it, keep and optionally refine wording
          - If code within the scope contradicts it, report to the user
          - If the scope is silent on it, report to the user. Silence does not imply the requirement is invalid
          - Then add any new requirements for behaviors found within the scope that aren't covered by existing requirements
  design:
    description: Technical design document with implementation details
    output: design.md
    plan:
      template: design.md
      discussion: true
      instruction: |
        Create the design document that explains HOW to implement the change.
        If the change is straightforward, keep design content minimal.

        Sections:
        - **Context**: Background, current state, constraints, stakeholders
        - **Goals / Non-Goals**: What this design achieves and explicitly excludes
        - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
        - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
        - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
        - **Open Questions**: Outstanding decisions or unknowns to resolve (these will be raised with the user during discussion — include anything that could affect implementation)

        Reference requirements from specs when making technical decisions.
        The design should explain how to satisfy the requirements defined in specs.
        Focus on architecture and approach, not line-by-line implementation.

        Good design docs explain the "why" behind technical decisions.
  tasks:
    description: Implementation checklist with trackable tasks
    output: tasks.md
    plan:
      template: tasks.md
      instruction: |
        Create the task list that breaks down the implementation work.

        IMPORTANT: Follow the template exactly. The apply phase parses checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

        Guidelines:
        - Structure task groups as vertical slices, not horizontal layers. Each group should cut through the stack end-to-end and produce a testable checkpoint. Avoid grouping by technical layer (all DB, then all services, then all API). Instead, group by thin slices that build on each other.
        - Group related tasks under ## numbered headings
        - Each task MUST be a checkbox: `- [ ] X.Y Task description`
        - Task groups should be small enough to complete in one session

        Reference specs for what needs to be built, design for how to build it.

        When listing tasks, consider whether the project's tests should be run as a verification step and include it if appropriate.
    apply:
      instruction: |
        Assigned Task Group:
        {{TASK_GROUP}}

        Work through the task group subtasks sequentially, marking each checkbox as complete (`- [x]`) as you finish it.
        Keep changes minimal and focused on each task.
        If you hit a blocker or unclear requirement, stop immediately and report the issue — do not guess or skip ahead.
        After completing all tasks in the group, summarize what was done.

workflows:
  spec-anchored:
    description: Pipeline with proposal, specs, design, and tasks. Specs accumulate over time as changes are archived into domain specs. Best for projects where you want to build up living documentation.
    plan: [proposal, specs, design, tasks]
    apply: [tasks]
    archive: [specs]
    document: specs
  spec-anchored-quick:
    description: Lighter version of spec-anchored with a brief instead of separate proposal and design. Good for smaller changes that still need spec tracking.
    plan: [brief, specs, tasks]
    apply: [tasks]
    archive: [specs]
    document: specs
  spec-first:
    description: Pipeline with proposal, specs, design, and tasks. Specs organize the change but aren't archived. Best for projects where you want structured planning without long-term spec maintenance.
    plan: [proposal, specs, design, tasks]
    apply: [tasks]
  spec-first-quick:
    description: Lighter version of spec-first with a brief instead of separate proposal and design. Specs organize the change but aren't archived.
    plan: [brief, specs, tasks]
    apply: [tasks]

workflow: spec-anchored
